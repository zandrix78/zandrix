<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zandrix | Soluções Digitais do Futuro</title>
    
    <!-- Fontes Futuristas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zandrix: {
                            black: '#000000',
                            purple: '#8A2BE2',
                            light: '#E0B0FF',
                            dark: '#1a052e'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        orbitron: ['Orbitron', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <!-- Estilos Customizados -->
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        /* Scrollbar Futurista */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000000; 
        }
        ::-webkit-scrollbar-thumb {
            background: #8A2BE2; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a64bf4; 
        }

        /* Efeitos de Glow e Vidro */
        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(138, 43, 226, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.7), 0 0 20px rgba(138, 43, 226, 0.5);
        }

        .neon-border {
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.3);
        }
        
        .neon-button:hover {
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.8), 0 0 40px rgba(138, 43, 226, 0.4);
        }

        /* Canvas 3D no fundo */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
    </style>

    <!-- React & Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Framer Motion (Versão UMD Global) -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence, useScroll, useTransform } = window.Motion;

        // --- COMPONENTE: FUNDO 3D (THREE.JS) ---
        const Background3D = () => {
            const mountRef = useRef(null);

            useEffect(() => {
                const scene = new THREE.Scene();
                // Fog para profundidade
                scene.fog = new THREE.FogExp2(0x000000, 0.02);

                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                mountRef.current.appendChild(renderer.domElement);

                // Partículas (Estrelas/Dados)
                const particlesGeometry = new THREE.BufferGeometry();
                const particlesCount = 2000;
                const posArray = new Float32Array(particlesCount * 3);

                for(let i = 0; i < particlesCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 40; // Espalhar
                }

                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const particlesMaterial = new THREE.PointsMaterial({
                    size: 0.02,
                    color: 0x8A2BE2,
                    transparent: true,
                    opacity: 0.8,
                });
                const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
                scene.add(particlesMesh);

                // Logo 3D Abstrata (Icosaedro Futurista)
                const geometry = new THREE.IcosahedronGeometry(1, 1);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x111111,
                    roughness: 0.1,
                    metalness: 0.9,
                    wireframe: false
                });
                const wireframeMaterial = new THREE.MeshBasicMaterial({
                    color: 0x8A2BE2,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.3
                });

                const logoMesh = new THREE.Mesh(geometry, material);
                const logoWireframe = new THREE.Mesh(geometry, wireframeMaterial);
                
                // Grupo para a logo
                const logoGroup = new THREE.Group();
                logoGroup.add(logoMesh);
                logoGroup.add(logoWireframe);
                logoGroup.position.set(3, 0, -2); // Posicionar à direita na Home
                
                // Adicionar apenas se a tela for grande
                if(window.innerWidth > 768) {
                    scene.add(logoGroup);
                }

                // Luzes
                const ambientLight = new THREE.AmbientLight(0x404040, 2);
                scene.add(ambientLight);

                const pointLight = new THREE.PointLight(0x8A2BE2, 2, 100);
                pointLight.position.set(5, 5, 5);
                scene.add(pointLight);
                
                const blueLight = new THREE.PointLight(0x00ffff, 1, 50);
                blueLight.position.set(-5, -5, 5);
                scene.add(blueLight);

                camera.position.z = 5;

                // Animação
                let mouseX = 0;
                let mouseY = 0;
                let targetX = 0;
                let targetY = 0;

                const handleMouseMove = (event) => {
                    mouseX = (event.clientX - window.innerWidth / 2) * 0.001;
                    mouseY = (event.clientY - window.innerHeight / 2) * 0.001;
                };

                document.addEventListener('mousemove', handleMouseMove);

                const animate = () => {
                    requestAnimationFrame(animate);

                    targetX = mouseX * 0.5;
                    targetY = mouseY * 0.5;

                    // Rotação suave das partículas
                    particlesMesh.rotation.y += 0.0005;
                    particlesMesh.rotation.x += 0.0002;

                    // Rotação da Logo
                    logoGroup.rotation.x += 0.005;
                    logoGroup.rotation.y += 0.005;
                    
                    // Movimento parallax suave
                    logoGroup.rotation.y += 0.05 * (targetX - logoGroup.rotation.y);
                    logoGroup.rotation.x += 0.05 * (targetY - logoGroup.rotation.x);

                    renderer.render(scene, camera);
                };

                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    
                    if(window.innerWidth <= 768) {
                        scene.remove(logoGroup);
                    } else {
                        scene.add(logoGroup);
                    }
                };

                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    document.removeEventListener('mousemove', handleMouseMove);
                    mountRef.current.removeChild(renderer.domElement);
                };
            }, []);

            return <div id="canvas-container" ref={mountRef} />;
        };

        // --- COMPONENTE: NAVBAR ---
        const Navbar = ({ activeSection, setActiveSection }) => {
            const links = [
                { name: 'Home', id: 'home' },
                { name: 'Sobre', id: 'sobre' },
                { name: 'Serviços', id: 'servicos' },
                { name: 'Portfólio', id: 'portfolio' },
                { name: 'Contato', id: 'contato' },
            ];

            return (
                <motion.nav 
                    initial={{ y: -100 }}
                    animate={{ y: 0 }}
                    transition={{ duration: 0.8 }}
                    className="fixed top-0 w-full z-50 glass-panel border-b border-zandrix-purple/20"
                >
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between h-20">
                            <div className="flex-shrink-0 cursor-pointer" onClick={() => setActiveSection('home')}>
                                <h1 className="font-orbitron text-2xl font-bold text-white tracking-wider">
                                    ZANDRIX<span className="text-zandrix-purple">.</span>
                                </h1>
                            </div>
                            <div className="hidden md:block">
                                <div className="ml-10 flex items-baseline space-x-8">
                                    {links.map((link) => (
                                        <button
                                            key={link.name}
                                            onClick={() => {
                                                setActiveSection(link.id);
                                                document.getElementById(link.id)?.scrollIntoView({ behavior: 'smooth' });
                                            }}
                                            className={`px-3 py-2 rounded-md text-sm font-medium transition-all duration-300 ${
                                                activeSection === link.id 
                                                ? 'text-zandrix-purple neon-text' 
                                                : 'text-gray-300 hover:text-white hover:bg-white/10'
                                            }`}
                                        >
                                            {link.name}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <a 
                                    href="https://wa.me/5533998154570" 
                                    target="_blank"
                                    className="bg-zandrix-purple hover:bg-purple-600 text-white px-6 py-2 rounded-full font-medium transition-all duration-300 neon-button flex items-center gap-2"
                                >
                                    <span>WhatsApp</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </motion.nav>
            );
        };

        // --- SEÇÃO: HERO (HOME) ---
        const Hero = () => {
            return (
                <section id="home" className="min-h-screen flex items-center justify-start px-4 sm:px-12 relative pt-20">
                    <div className="max-w-4xl z-10">
                        <motion.div
                            initial={{ opacity: 0, y: 30 }}
                            whileInView={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.8 }}
                        >
                            <h2 className="text-zandrix-purple font-orbitron text-lg mb-4 tracking-[0.2em]">INOVAÇÃO DIGITAL</h2>
                            <h1 className="text-5xl md:text-7xl font-bold font-orbitron leading-tight mb-6 text-white">
                                Transformamos empresas comuns em <br/>
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-zandrix-purple to-white neon-text">
                                    presenças extraordinárias.
                                </span>
                            </h1>
                            <p className="text-gray-400 text-lg md:text-xl max-w-2xl mb-10 leading-relaxed">
                                Design inspirado na engenharia aeroespacial. Performance de nível global. 
                                A Zandrix cria o futuro da sua marca hoje.
                            </p>
                            
                            <div className="flex flex-col sm:flex-row gap-4">
                                <motion.button 
                                    whileHover={{ scale: 1.05 }}
                                    whileTap={{ scale: 0.95 }}
                                    className="bg-zandrix-purple text-white px-8 py-4 rounded-lg font-bold text-lg neon-button"
                                    onClick={() => document.getElementById('contato').scrollIntoView({ behavior: 'smooth' })}
                                >
                                    INICIAR PROJETO
                                </motion.button>
                                <motion.button 
                                    whileHover={{ scale: 1.05, backgroundColor: "rgba(255,255,255,0.1)" }}
                                    whileTap={{ scale: 0.95 }}
                                    className="border border-zandrix-purple text-white px-8 py-4 rounded-lg font-bold text-lg hover:border-white transition-colors"
                                    onClick={() => document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' })}
                                >
                                    VER PORTFÓLIO
                                </motion.button>
                            </div>
                        </motion.div>
                    </div>
                </section>
            );
        };

        // --- SEÇÃO: SERVIÇOS ---
        const Services = () => {
            const services = [
                { title: "Sites Profissionais", desc: "Plataformas robustas com design premium e alta conversão.", icon: "💻" },
                { title: "E-commerce", desc: "Lojas virtuais otimizadas para vendas e experiência do usuário.", icon: "🛍️" },
                { title: "SEO Avançado", desc: "Posicionamento estratégico no Google para dominar seu nicho.", icon: "🚀" },
                { title: "Landing Pages", desc: "Páginas de alta performance focadas em capturar leads.", icon: "🎯" },
            ];

            return (
                <section id="servicos" className="py-24 px-4 relative">
                    <div className="max-w-7xl mx-auto">
                        <motion.div 
                            initial={{ opacity: 0 }}
                            whileInView={{ opacity: 1 }}
                            className="text-center mb-16"
                        >
                            <h2 className="text-zandrix-purple font-orbitron text-xl mb-2">NOSSAS SOLUÇÕES</h2>
                            <h3 className="text-4xl font-bold text-white">Tecnologia de Ponta</h3>
                        </motion.div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                            {services.map((service, index) => (
                                <motion.div
                                    key={index}
                                    initial={{ opacity: 0, y: 20 }}
                                    whileInView={{ opacity: 1, y: 0 }}
                                    transition={{ delay: index * 0.1 }}
                                    whileHover={{ y: -10 }}
                                    className="glass-panel p-8 rounded-2xl hover:border-zandrix-purple transition-colors duration-300 group"
                                >
                                    <div className="text-4xl mb-6 bg-zandrix-purple/20 w-16 h-16 rounded-full flex items-center justify-center group-hover:bg-zandrix-purple/40 transition-colors">
                                        {service.icon}
                                    </div>
                                    <h4 className="text-xl font-bold mb-4 font-orbitron">{service.title}</h4>
                                    <p className="text-gray-400 text-sm leading-relaxed">{service.desc}</p>
                                </motion.div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // --- SEÇÃO: PORTFÓLIO ---
        const Portfolio = () => {
            return (
                <section id="portfolio" className="py-24 px-4 bg-black/50">
                    <div className="max-w-7xl mx-auto">
                        <motion.div 
                            initial={{ opacity: 0 }}
                            whileInView={{ opacity: 1 }}
                            className="mb-12 flex justify-between items-end"
                        >
                            <div>
                                <h2 className="text-zandrix-purple font-orbitron text-xl mb-2">PORTFÓLIO</h2>
                                <h3 className="text-4xl font-bold text-white">Projetos Recentes</h3>
                            </div>
                        </motion.div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {[1, 2, 3].map((item) => (
                                <motion.div 
                                    key={item}
                                    initial={{ opacity: 0, scale: 0.9 }}
                                    whileInView={{ opacity: 1, scale: 1 }}
                                    whileHover={{ scale: 1.02 }}
                                    className="relative aspect-video rounded-xl overflow-hidden cursor-pointer group border border-gray-800"
                                >
                                    <div className="absolute inset-0 bg-gradient-to-t from-black to-transparent opacity-80 z-10"></div>
                                    {/* Placeholder Image - Em produção usar imagens reais */}
                                    <img 
                                        src={`https://source.unsplash.com/random/800x600?tech,website&sig=${item}`} 
                                        alt="Projeto" 
                                        className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
                                    />
                                    <div className="absolute bottom-0 left-0 p-6 z-20">
                                        <h4 className="text-xl font-bold font-orbitron text-white">Projeto Alpha {item}</h4>
                                        <p className="text-zandrix-purple text-sm">Web Design & Dev</p>
                                    </div>
                                </motion.div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // --- SEÇÃO: CONTATO ---
        const Contact = () => {
            return (
                <section id="contato" className="py-24 px-4 relative overflow-hidden">
                    <div className="max-w-4xl mx-auto glass-panel rounded-3xl p-8 md:p-16 relative z-10">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-5xl font-bold font-orbitron mb-4">Vamos Criar o Futuro?</h2>
                            <p className="text-gray-400">Solicite um orçamento e eleve o nível da sua empresa.</p>
                        </div>

                        <form className="space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <input type="text" placeholder="Nome" className="w-full bg-black/50 border border-gray-700 rounded-lg p-4 text-white focus:border-zandrix-purple focus:outline-none transition-colors" />
                                <input type="email" placeholder="Email" className="w-full bg-black/50 border border-gray-700 rounded-lg p-4 text-white focus:border-zandrix-purple focus:outline-none transition-colors" />
                            </div>
                            <input type="text" placeholder="Empresa" className="w-full bg-black/50 border border-gray-700 rounded-lg p-4 text-white focus:border-zandrix-purple focus:outline-none transition-colors" />
                            <textarea rows="4" placeholder="Detalhes do Projeto" className="w-full bg-black/50 border border-gray-700 rounded-lg p-4 text-white focus:border-zandrix-purple focus:outline-none transition-colors"></textarea>
                            
                            <button className="w-full bg-zandrix-purple hover:bg-purple-600 text-white font-bold py-4 rounded-lg neon-button transition-all">
                                ENVIAR SOLICITAÇÃO
                            </button>
                        </form>

                        <div className="mt-12 flex justify-center gap-8 text-gray-400">
                            <a href="https://wa.me/5533998154570" className="hover:text-zandrix-purple transition-colors flex items-center gap-2">
                                <span>WhatsApp: (33) 99815-4570</span>
                            </a>
                            <a href="#" className="hover:text-zandrix-purple transition-colors">
                                @zandrixbr
                            </a>
                        </div>
                    </div>
                </section>
            );
        };

        // --- COMPONENTE: FOOTER ---
        const Footer = () => {
            return (
                <footer className="border-t border-gray-900 py-12 bg-black text-center relative z-10">
                    <div className="flex justify-center items-center mb-6 opacity-50 hover:opacity-100 transition-opacity">
                        {/* Simulação da Logo Pequena */}
                        <div className="w-8 h-8 border border-zandrix-purple rounded-full flex items-center justify-center mr-2">
                            <div className="w-2 h-2 bg-zandrix-purple rounded-full"></div>
                        </div>
                        <span className="font-orbitron font-bold text-xl">ZANDRIX</span>
                    </div>
                    <p className="text-gray-600 text-sm">
                        © {new Date().getFullYear()} Zandrix — Criando presença digital para empresas que querem crescer.
                    </p>
                </footer>
            );
        };

        // --- APP PRINCIPAL ---
        const App = () => {
            const [activeSection, setActiveSection] = useState('home');

            // Efeito de scroll para atualizar o menu ativo
            useEffect(() => {
                const handleScroll = () => {
                    const sections = ['home', 'sobre', 'servicos', 'portfolio', 'contato'];
                    const scrollPosition = window.scrollY + 200;

                    for (const section of sections) {
                        const element = document.getElementById(section);
                        if (element && element.offsetTop <= scrollPosition && (element.offsetTop + element.offsetHeight) > scrollPosition) {
                            setActiveSection(section);
                        }
                    }
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="relative w-full min-h-screen">
                    <Background3D />
                    <Navbar activeSection={activeSection} setActiveSection={setActiveSection} />
                    
                    <main>
                        <Hero />
                        
                        {/* Seção Sobre (Simplificada para o exemplo) */}
                        <section id="sobre" className="py-20 px-4 text-center">
                            <motion.div 
                                initial={{ opacity: 0 }}
                                whileInView={{ opacity: 1 }}
                                className="max-w-3xl mx-auto"
                            >
                                <h2 className="text-zandrix-purple font-orbitron mb-4">SOBRE NÓS</h2>
                                <p className="text-2xl text-gray-300 leading-relaxed">
                                    "Não criamos apenas sites. Criamos ecossistemas digitais que respiram inovação e exalam autoridade."
                                </p>
                            </motion.div>
                        </section>

                        <Services />
                        <Portfolio />
                        <Contact />
                    </main>

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <!-- Inicialização dos ícones Lucide -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
